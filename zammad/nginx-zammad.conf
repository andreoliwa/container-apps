#
# Custom Zammad nginx config — based on the upstream template with an added
# /ical location that rewrites CLASS:PRIVATE → CLASS:PUBLIC so Google Calendar
# shows event details instead of "Busy".
#
# This file is mounted over contrib/nginx/zammad.conf so the entrypoint's sed
# substitutions (port, scheme, server_name, etc.) still apply at startup.
#

upstream zammad-railsserver {
  server 127.0.0.1:3000;
}

upstream zammad-websocket {
  server 127.0.0.1:6042;
}

server {
  listen 80;
  listen [::]:80;

  # replace 'localhost' with your fqdn if you want to use zammad from remote
  server_name localhost;

  # security - prevent information disclosure about server version
  server_tokens off;

  root /opt/zammad/public;

  access_log /var/log/nginx/zammad.access.log;
  error_log  /var/log/nginx/zammad.error.log;

  client_max_body_size 50M;

  location ~ ^/(assets/|robots.txt|humans.txt|favicon.ico|apple-touch-icon.png) {
    expires max;
  }

  # legacy web socket server
  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header CLIENT_IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_pass http://zammad-websocket;
  }

  # action cable
  location /cable {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header CLIENT_IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_pass http://zammad-railsserver;
  }

  # iCal feed: rewrite CLASS:PRIVATE → CLASS:PUBLIC so Google Calendar
  # shows ticket titles instead of "Busy" (Google hides details for
  # CLASS:PRIVATE events on subscribed calendars)
  location /ical {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header CLIENT_IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User "";
    proxy_read_timeout 300;
    proxy_pass http://zammad-railsserver;

    sub_filter_once off;
    # Zammad serves iCal as text/plain (not text/calendar), and sub_filter
    # defaults to text/html only, so we must explicitly include text/plain.
    sub_filter_types text/plain;
    sub_filter 'CLASS:PRIVATE' 'CLASS:PUBLIC';
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header CLIENT_IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Change this line in an SSO setup
    proxy_set_header X-Forwarded-User "";

    proxy_read_timeout 300;
    proxy_pass http://zammad-railsserver;

    gzip on;
    gzip_types text/plain text/xml text/css image/svg+xml application/javascript application/x-javascript application/json application/xml;
    gzip_proxied any;
  }
}
